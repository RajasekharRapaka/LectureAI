# /etc/nginx/sites-available/tubescribe
# Nginx reverse proxy — sits in front of Gunicorn on port 5000.
#
# Install:
#   sudo cp nginx.conf /etc/nginx/sites-available/tubescribe
#   sudo ln -s /etc/nginx/sites-available/tubescribe /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;          # Replace _ with your domain or EC2 public IP

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Upload limit — allows large transcript pastes
    client_max_body_size 10M;

    # Proxy to Gunicorn
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Match gunicorn timeout
        proxy_read_timeout    180s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    180s;
    }

    # Static files served directly by Nginx (faster than Flask)
    location /static/ {
        alias /home/ubuntu/tubescribe/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
